<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Todo List</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h1>My To-Do list</h1>

    <div class="input-section">
        <input type="text" placeholder="Add a new task...">
        <button>Add</button>
    </div>

    <div class="task-list">
        <div class="task">
            <span>Finish WebOps Application</span>
            <button class="complete">✓</button>
        </div>

        <div class="task completed">
            <span>Read WebOps Fundae</span>
            <button class="complete">✓</button>
        </div>

        <div class="task">
            <span>Design TODO list</span>
            <button class="complete">✓</button>
        </div>
    </div>
</div>

</body>
</html>
